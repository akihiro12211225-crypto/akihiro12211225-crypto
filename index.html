
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字クイズ</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
    text-align:center;
}

.card{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    margin-top:0;
}

#question{
    font-size:32px;
    font-weight:bold;
    margin:25px 0;
}

#answer{
    display:none;
    font-size:36px;
    color:#1565c0;
    margin:20px 0;
}

button{
    font-size:18px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    margin:5px;
    cursor:pointer;
}

.primary{
    background:#1976d2;
    color:white;
}

.good{
    background:#2e7d32;
    color:white;
}

.bad{
    background:#c62828;
    color:white;
}

.gray{
    background:#666;
    color:white;
}

#canvas{
    width:100%;
    max-width:700px;
    height:320px;
    border:3px solid #333;
    background:#fff;
    display:block;
    margin:20px auto;
    touch-action:none;
    border-radius:8px;
}

#stats{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="card">

<h1>漢字クイズ</h1>

<div>
<button class="primary" onclick="setMode('normal')">通常モード</button>
<button class="gray" onclick="setMode('weak')">苦手モード</button>
</div>

<p id="modeLabel">通常モード</p>

<div id="question"></div>

<canvas id="canvas"></canvas>

<div>
<button onclick="clearCanvas()">消す</button>
<button class="primary" onclick="showAnswer()">答えを見る</button>
</div>

<div id="answer"></div>

<div id="judgeButtons" style="display:none;">
<button class="good" onclick="markCorrect()">○ 正解</button>
<button class="bad" onclick="markWrong()">× 不正解</button>
</div>

<div style="margin-top:15px;">
<button class="primary" onclick="nextQuestion()">次の問題</button>
</div>

<div id="stats"></div>

</div>

<script>

const questions = [
{
question:"明るいたいど",
answer:"態度"
},
{
question:"物語のこうせい",
answer:"構成"
},
{
question:"息をころす",
answer:"殺す"
},
{
question:"作業をまかせる",
answer:"任せる"
},
{
question:"職場のどうりょう",
answer:"同僚"
}
];

const STORAGE_KEY = "kanji_quiz_stats";

let stats =
JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

let current = null;
let mode = "normal";

function saveStats(){
localStorage.setItem(
STORAGE_KEY,
JSON.stringify(stats)
);
}

function setMode(newMode){

mode = newMode;

document.getElementById("modeLabel").textContent =
mode === "normal"
? "通常モード"
: "苦手モード";

nextQuestion();
}

function getPool(){

if(mode === "normal"){
return questions;
}

const weakQuestions =
questions.filter(q => {

const wrong =
stats[q.question]?.wrong || 0;

return wrong > 0;
});

return weakQuestions.length
? weakQuestions
: questions;
}

function nextQuestion(){

const pool = getPool();

current =
pool[Math.floor(Math.random() * pool.length)];

document.getElementById("question").textContent =
current.question;

document.getElementById("answer").style.display =
"none";

document.getElementById("judgeButtons").style.display =
"none";

clearCanvas();

updateStats();
}

function showAnswer(){

document.getElementById("answer").textContent =
current.answer;

document.getElementById("answer").style.display =
"block";

document.getElementById("judgeButtons").style.display =
"block";
}

function markCorrect(){

if(!stats[current.question]){
stats[current.question] =
{correct:0, wrong:0};
}

stats[current.question].correct++;

saveStats();

nextQuestion();
}

function markWrong(){

if(!stats[current.question]){
stats[current.question] =
{correct:0, wrong:0};
}

stats[current.question].wrong++;

saveStats();

nextQuestion();
}

function updateStats(){

const weakCount =
Object.keys(stats)
.filter(k => stats[k].wrong > 0)
.length;

document.getElementById("stats").innerHTML =
"苦手登録数：" + weakCount + "問";
}

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

function resizeCanvas(){

const rect =
canvas.getBoundingClientRect();

canvas.width =
rect.width;

canvas.height =
rect.height;

ctx.lineWidth = 5;
ctx.lineCap = "round";
ctx.lineJoin = "round";
}

resizeCanvas();

window.addEventListener(
"resize",
resizeCanvas
);

let drawing = false;

function getPos(e){

const rect =
canvas.getBoundingClientRect();

return {
x:e.clientX - rect.left,
y:e.clientY - rect.top
};
}

canvas.addEventListener(
"pointerdown",
(e)=>{

drawing = true;

const pos = getPos(e);

ctx.beginPath();
ctx.moveTo(pos.x,pos.y);

e.preventDefault();
}
);

canvas.addEventListener(
"pointermove",
(e)=>{

if(!drawing) return;

const pos = getPos(e);

ctx.lineTo(pos.x,pos.y);
ctx.stroke();

e.preventDefault();
}
);

function stopDrawing(){
drawing = false;
}

canvas.addEventListener(
"pointerup",
stopDrawing
);

canvas.addEventListener(
"pointerleave",
stopDrawing
);

canvas.addEventListener(
"pointercancel",
stopDrawing
);

function clearCanvas(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);
}

nextQuestion();

</script>

</body>
</html>
